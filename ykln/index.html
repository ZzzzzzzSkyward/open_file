<html>
<head>
    <title>昨日青空：印刻流年</title>
    <script>
        var init=function () {
            if(!window.zzz){
                setTimeout(init,1000);
                return;
            }
            window.zzz.fetch.js("../../main/zdata.js");
            setTimeout(init_next,1000);
        };
        var formatit=function (i) {
            i=i.toString();
            var text="";
            for(let j=i.length;j<2;j++) text+="0";
            return text+i;
        };
        var init_next=function () {
            var page=zzz.path.split(zzz.browser.uri).component.pn;
            if(!page) page=1;
            else page=zzz.toNum(page);
            if(page<1||page>29){
                document.body.innerHTML+="<p>一共1-29页，请输入正确页数</p>";
                return;
            }
            var len=[0,10,6,6,6,9,9,7,7,9,14,11,10,6,6,10,4,4,4,5,4,4,3,4,6,3,4,10,10,16];
            var parent=document.body;
            var text="";
            for(let i=0;i<len[page];i++){
                text+="<img class='comic' src='./"+page+"/"+formatit(i)+".jpg"+"' loading='lazy' />";
            }
            parent.innerHTML+="<a href='https://zzzzzzzskyward.github.io/open_file/ykln/?pn="+(page>1?(page-1):1).toString()+"'>上一页</a>..........<a href='https://zzzzzzzskyward.github.io/open_file/ykln/?pn="+(page>28?page:(page+1))+"'>下一页</a><br/>"+text;
        }
    </script>
</head>
<body>
<style>
    .comic{
        display: block;
        width:100%;
        position: relative;
        margin: 0;
        padding: 0;
        border: 0;
    }
</style>
<p id="hidden">昨日青空：印刻流年的漫画（来自口袋巧克力的微信公众号），请修改网址阅读，一共是1-29页，网址为<a href="https://zzzzzzzskyward.github.io/open_file/ykln/?pn=1">https://zzzzzzzskyward.github.io/open_file/ykln/?pn=1</a></p>
<script src="../../main/zzz.js"></script>
<script>
    init();
</script>
</body>
</html>
